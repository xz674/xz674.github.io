<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>xz674</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            font-weight: 300;
            background: #ffffff;
            color: #000000;
            line-height: 1.6;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: #ffffff;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            gap: 3rem;
        }

        .nav-left a {
            text-decoration: none;
            color: #000000;
            font-size: 0.7rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            transition: opacity 0.2s;
        }

        .nav-left a:hover {
            opacity: 0.4;
        }

        .nav-right {
            display: flex;
            gap: 1.5rem;
        }

        .nav-right a {
            color: #000000;
            transition: opacity 0.2s;
        }

        .nav-right a:hover {
            opacity: 0.4;
        }

        .nav-right svg {
            width: 16px;
            height: 16px;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            width: 100%;
            padding-top: 60px;
        }

        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Projects Grid */
        .projects {
            padding: 0;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
        }

        .project-card {
            position: relative;
            overflow: hidden;
            aspect-ratio: 4/3;
            display: block;
        }

        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: opacity 0.3s ease;
        }

        .project-card:hover img {
            opacity: 0.85;
        }

        .project-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 1.5rem;
            background: linear-gradient(to top, rgba(0,0,0,0.5), transparent);
            color: #ffffff;
        }

        .project-title h2 {
            font-size: 0.85rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Footer */
        footer {
            padding: 3rem 2rem;
            font-size: 0.7rem;
            color: #888888;
            letter-spacing: 0.1em;
        }

        footer a {
            color: #888888;
            text-decoration: none;
            transition: color 0.2s;
        }

        footer a:hover {
            color: #000000;
        }

        /* Mobile */
        @media (max-width: 768px) {
            nav {
                padding: 1rem 1.5rem;
            }

            .nav-left {
                gap: 1.5rem;
            }

            .nav-left a {
                font-size: 0.6rem;
                letter-spacing: 0.1em;
            }

            .nav-right {
                display: none;
            }

            .projects {
                grid-template-columns: 1fr;
            }

            .project-title h2 {
                font-size: 0.75rem;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nav-left">
            <a href="#projects">Projects</a>
            <a href="#archive">Archive</a>
            <a href="#about">About</a>
            <a href="#contact">Contact</a>
        </div>
        <div class="nav-right">
            <a href="https://instagram.com/" target="_blank" aria-label="Instagram">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="2" width="20" height="20" rx="5"/>
                    <circle cx="12" cy="12" r="4"/>
                    <circle cx="18" cy="6" r="1"/>
                </svg>
            </a>
            <a href="mailto:your@email.com" aria-label="Email">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <path d="M2 4l10 8 10-8"/>
                </svg>
            </a>
        </div>
    </nav>

    <section class="hero">
        <img src="https://picsum.photos/1600/900?random=1" alt="Hero">
    </section>

    <section class="projects" id="projects">
        <a href="#" class="project-card">
            <img src="https://picsum.photos/800/600?random=2" alt="Project 1">
            <div class="project-title">
                <h2>Project One</h2>
            </div>
        </a>
        <a href="#" class="project-card">
            <img src="https://picsum.photos/800/600?random=3" alt="Project 2">
            <div class="project-title">
                <h2>Project Two</h2>
            </div>
        </a>
        <a href="#" class="project-card">
            <img src="https://picsum.photos/800/600?random=4" alt="Project 3">
            <div class="project-title">
                <h2>Project Three</h2>
            </div>
        </a>
        <a href="#" class="project-card">
            <img src="https://picsum.photos/800/600?random=5" alt="Project 4">
            <div class="project-title">
                <h2>Project Four</h2>
            </div>
        </a>
        <a href="#" class="project-card">
            <img src="https://picsum.photos/800/600?random=6" alt="Project 5">
            <div class="project-title">
                <h2>Project Five</h2>
            </div>
        </a>
        <a href="#" class="project-card">
            <img src="https://picsum.photos/800/600?random=7" alt="Project 6">
            <div class="project-title">
                <h2>Project Six</h2>
            </div>
        </a>
    </section>

    <footer>
        <p>© 2026 xz674</p>
    </footer>
</body>
</html>
